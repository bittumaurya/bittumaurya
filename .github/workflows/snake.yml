name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Generate snake
      - uses: Platane/snk@v3
        with:
          github_user_name: bittumaurya
          outputs: |
            dist/github-contribution-grid-snake.svg

      # Deploy to output branch (UPDATED ACTION ✅)
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
